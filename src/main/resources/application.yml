spring:
  application:
    name: textil-inventario

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/textil_inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima}
    username: ${DB_USERNAME:textil_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:25MB}
      max-request-size: ${MAX_UPLOAD_SIZE:25MB}
    session:
      # La cookie de sesion (JSESSIONID) igual dura la jornada; el "recordar
      # sesion" (remember-me, ver SecurityConfig) es lo que mantiene logueado
      # al usuario en el celular cuando la PWA se suspende y esta cookie cae.
      timeout: 8h
      cookie:
        # SameSite=Lax evita que el navegador descarte la cookie al reabrir la
        # PWA desde el icono del escritorio (contexto de navegacion top-level).
        same-site: lax
        http-only: true

server:
  port: 8080
  # Detras de nginx (que termina el TLS), la app recibe las requests por HTTP
  # interno. Sin esto, Spring genera redirects a http:// y cookies sin Secure
  # cuando el usuario entro por https -> loops de login. 'framework' hace que
  # honre X-Forwarded-Proto/For que nginx ya envia.
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.security: WARN
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

documentos:
  ruta-base: ${DOCUMENTOS_PATH:./documentos}

app:
  nombre-empresa: ${NOMBRE_EMPRESA:Laura & Clemente}
  # Etiqueta del entorno (ej. "BETA"). Vacia en produccion; el stack de dev
  # (docker-compose.dev.yml) la pone en "BETA" para distinguir el login de
  # staging del de produccion de un vistazo. Ver login.html.
  entorno-etiqueta: ${ENTORNO_ETIQUETA:}
  # Clave que firma la cookie "recordar sesion" (remember-me). Debe fijarse por
  # instancia (valor unico y secreto) y NO cambiar entre despliegues, o los
  # usuarios quedan deslogueados en cada reinicio. El default es solo para dev.
  remember-me-key: ${REMEMBER_ME_KEY}
---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    org.springframework.security: DEBUG
---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    org.springframework.security: WARN

