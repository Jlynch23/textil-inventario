spring:
  application:
    name: textil-inventario

  datasource:
    url: jdbc:mysql://localhost:3307/textil_inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
    username: textil_user
    password: ***REMOVED***
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.security: DEBUG

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

documentos:
  ruta-base: ${DOCUMENTOS_PATH:./documentos}
