spring:
  application:
    name: textil-inventario

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/textil_inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima}
    username: ${DB_USERNAME:textil_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:25MB}
      max-request-size: ${MAX_UPLOAD_SIZE:25MB}

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.security: WARN
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

documentos:
  ruta-base: ${DOCUMENTOS_PATH:./documentos}

app:
  nombre-empresa: ${NOMBRE_EMPRESA:Laura & Clemente}
---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    org.springframework.security: DEBUG
---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    org.springframework.security: WARN

