<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Usuarios</title></head>
<body>
<section>
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- FORMULARIO -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3">Nuevo Usuario</h6>
                    <form th:action="@{/usuarios/guardar}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" class="form-control" name="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Usuario</label>
                            <input type="text" class="form-control" name="username" placeholder="jlynch" required>
                            <small class="text-muted">Primera letra del nombre + apellido completo, sin espacios.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password" class="form-control" name="password" minlength="6" required>
                            <small class="text-muted">Mínimo 6 caracteres.</small>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Rol</label>
                            <select class="form-select" name="rolId" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombre}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-person-plus me-2"></i>Crear Usuario
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-body p-0">
                    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Usuarios Registrados</span>
                        <span class="badge bg-secondary" th:text="${usuarios.size()} + ' usuarios'"></span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Usuario</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${usuarios}">
                                    <td th:text="${u.nombre}"></td>
                                    <td th:text="${u.username}"></td>
                                    <td>
                                        <span class="badge bg-primary" th:text="${u.rol.nombre}"></span>
                                    </td>
                                    <td>
                                        <span th:if="${u.activo}" class="badge bg-success">Activo</span>
                                        <span th:unless="${u.activo}" class="badge bg-secondary">Inactivo</span>
                                    </td>
                                    <td>
                                        <button type="button" class="btn btn-sm btn-outline-primary" title="Resetear contraseña"
                                                data-bs-toggle="modal" th:data-bs-target="'#modalReset' + ${u.id}">
                                            <i class="bi bi-key"></i>
                                        </button>
                                        <form th:if="${u.activo}" th:action="@{/usuarios/inactivar/{id}(id=${u.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm btn-outline-warning" title="Inactivar (reversible)"
                                                    onclick="return confirm('¿Inactivar este usuario? No podrá iniciar sesión, pero se conserva su historial.')">
                                                <i class="bi bi-eye-slash"></i>
                                            </button>
                                        </form>
                                        <form th:unless="${u.activo}" th:action="@{/usuarios/reactivar/{id}(id=${u.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm btn-outline-success" title="Reactivar">
                                                <i class="bi bi-eye"></i>
                                            </button>
                                        </form>
                                        <form th:action="@{/usuarios/eliminar/{id}(id=${u.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar definitivamente"
                                                    onclick="return confirm('¿ELIMINAR este usuario de forma permanente? Esta acción no se puede deshacer. Si tiene historial asociado, el sistema lo bloqueará.')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>

                                        <!-- Modal de reset de contraseña -->
                                        <div class="modal fade" th:id="'modalReset' + ${u.id}" tabindex="-1">
                                            <div class="modal-dialog">
                                                <div class="modal-content">
                                                    <form th:action="@{/usuarios/resetear-password/{id}(id=${u.id})}" method="post">
                                                        <div class="modal-header">
                                                            <h6 class="modal-title">Resetear contraseña de <span th:text="${u.nombre}"></span></h6>
                                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                                        </div>
                                                        <div class="modal-body">
                                                            <label class="form-label fw-semibold">Nueva contraseña</label>
                                                            <input type="password" class="form-control" name="password" minlength="6" required>
                                                            <small class="text-muted">Mínimo 6 caracteres.</small>
                                                        </div>
                                                        <div class="modal-footer">
                                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                            <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
