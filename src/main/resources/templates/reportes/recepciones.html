<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Reporte: Recepciones</title></head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Reporte: Recepciones</h2>
        <a th:href="@{/reportes}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Reportes</a>
    </div>

    <form method="get" th:action="@{/reportes/recepciones}" class="row g-2 mb-3">
        <div class="col-md-3">
            <label class="form-label small">Proveedor</label>
            <select name="empresaId" class="form-select">
                <option value="">Todos</option>
                <option th:each="e : ${empresas}"
                        th:value="${e.id}"
                        th:selected="${e.id == filtroEmpresaId}"
                        th:text="${e.nombre}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label small">Desde</label>
            <input type="date" name="desde" class="form-control" th:value="${filtroDesde}">
        </div>
        <div class="col-md-2">
            <label class="form-label small">Hasta</label>
            <input type="date" name="hasta" class="form-control" th:value="${filtroHasta}">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-funnel"></i> Filtrar</button>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <a class="btn btn-success w-100"
               th:href="@{/reportes/recepciones/excel(empresaId=${filtroEmpresaId}, desde=${filtroDesde}, hasta=${filtroHasta})}">
                <i class="bi bi-file-earmark-excel"></i> Exportar a Excel
            </a>
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <a th:href="@{/reportes/recepciones}" class="btn btn-outline-secondary w-100"><i class="bi bi-x-circle"></i> Limpiar</a>
        </div>
    </form>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>N° Guía</th>
            <th>N° Factura</th>
            <th>Proveedor</th>
            <th>Fecha Guía</th>
            <th>Estado</th>
            <th>Detalle</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${recepciones}">
            <td th:text="${r.numeroGuia}"></td>
            <td th:text="${r.numeroFactura != null ? r.numeroFactura : '-'}"></td>
            <td th:text="${r.empresa.nombre}"></td>
            <td th:text="${#temporals.format(r.fechaGuia, 'dd/MM/yyyy')}"></td>
            <td th:text="${r.estado}"></td>
            <td>
                <a th:href="@{/recepciones/{id}/detalle(id=${r.id})}" class="btn btn-sm btn-outline-primary">Ver</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(recepciones)}">
            <td colspan="6" class="text-center text-muted">No hay recepciones con estos filtros.</td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
