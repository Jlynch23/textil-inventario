<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Empresas</title></head>
<body>
<section>
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- FORMULARIO -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3"
                        th:text="${empresa.id != null} ? 'Editar Empresa' : 'Nueva Empresa'">Nueva Empresa</h6>
                    <form th:action="@{/catalogo/empresas/guardar}" th:object="${empresa}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}"
                                   required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">RUC</label>
                            <input type="text" class="form-control" th:field="*{ruc}"
                                   required>
                            <small class="text-muted">La carpeta de documentos se genera sola a partir del nombre.</small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-save me-2"></i>Guardar
                        </button>
                        <a th:href="@{/catalogo/empresas}" class="btn btn-light w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-body p-0">
                    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Empresas Registradas</span>
                        <span class="badge bg-secondary" th:text="${empresas.size()} + ' empresas'"></span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>RUC</th>
                                    <th>Carpeta (auto)</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="e : ${empresas}" th:classappend="${!e.activo} ? 'text-muted' : ''">
                                    <td>
                                        <span th:text="${e.nombre}"></span>
                                        <span th:unless="${e.activo}" class="badge bg-secondary ms-2">Inactiva</span>
                                    </td>
                                    <td><code th:text="${e.ruc}"></code></td>
                                    <td th:text="${e.carpeta}"></td>
                                    <td>
                                        <a th:href="@{/catalogo/empresas/editar/{id}(id=${e.id})}"
                                           class="btn btn-sm btn-outline-primary" title="Editar">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <!-- Activa: botón para inactivar -->
                                        <form th:if="${e.activo}" th:action="@{/catalogo/empresas/inactivar/{id}(id=${e.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm btn-outline-warning" title="Inactivar (reversible)"
                                                    onclick="return confirm('¿Inactivar esta empresa? Dejará de aparecer en los formularios, pero queda en la lista y podés reactivarla cuando quieras.')">
                                                <i class="bi bi-eye-slash"></i>
                                            </button>
                                        </form>
                                        <!-- Inactiva: botón para reactivar -->
                                        <form th:unless="${e.activo}" th:action="@{/catalogo/empresas/reactivar/{id}(id=${e.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm btn-outline-success" title="Reactivar">
                                                <i class="bi bi-eye"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
