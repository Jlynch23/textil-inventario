<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Carta de Colores</title></head>
<body>
<section>
    <style>
        .codigo-fast-dye {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1F4E79;
            background: none;
        }
    </style>
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- FORMULARIO (solo SUPERADMIN puede crear/editar) -->
        <div class="col-md-4" sec:authorize="hasAnyRole('ADMIN','SUPERADMIN')">
            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3"
                        th:text="${color.id != null} ? 'Editar Color' : 'Nuevo Color'">Nuevo Color</h6>
                    <form th:action="@{/catalogo/colores/guardar}" th:object="${color}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre Oficial</label>
                            <input type="text" class="form-control" th:field="*{nombreOficial}"
                                   required>
                            <small class="text-muted">El nombre real, tal como aparece en la guía de FAST DYE.</small>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Apodo (opcional)</label>
                            <input type="text" class="form-control" th:field="*{apodo}"
                                  >
                            <small class="text-muted">Si lo llenas, este es el nombre que se mostrará en todo el sistema en vez del nombre oficial largo.</small>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Código FAST DYE</label>
                            <input type="text" class="form-control" th:field="*{codigoFastDye}"
                                  >
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-save me-2"></i>Guardar Color
                        </button>
                        <a th:href="@{/catalogo/colores}" class="btn btn-light w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div th:class="${esAdmin} ? 'col-md-8' : 'col-md-8 offset-md-2'">
            <div class="card">
                <div class="card-body p-0">
                    <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Carta de Colores</span>
                        <span class="badge bg-secondary" th:text="${colores.size()} + ' colores'"></span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Código FAST DYE</th>
                                    <th sec:authorize="hasAnyRole('ADMIN','SUPERADMIN')">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c : ${colores}">
                                    <td>
                                        <span th:text="${c.nombreMostrar}"></span>
                                        <br th:if="${c.apodo != null and !#strings.isEmpty(c.apodo)}">
                                        <small class="text-muted" th:if="${c.apodo != null and !#strings.isEmpty(c.apodo)}"
                                               th:text="${c.nombreOficial}"></small>
                                    </td>
                                    <td><code class="codigo-fast-dye" th:text="${c.codigoFastDye}"></code></td>
                                    <td sec:authorize="hasAnyRole('ADMIN','SUPERADMIN')">
                                        <a th:href="@{/catalogo/colores/editar/{id}(id=${c.id})}"
                                           class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/catalogo/colores/inactivar/{id}(id=${c.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm btn-outline-warning" title="Inactivar (soft delete, reversible)"
                                                    onclick="return confirm('¿Inactivar este color?')">
                                                <i class="bi bi-eye-slash"></i>
                                            </button>
                                        </form>
                                        <form th:action="@{/catalogo/colores/eliminar/{id}(id=${c.id})}" method="post" style="display:inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar definitivamente"
                                                    onclick="return confirm('¿ELIMINAR este color de forma permanente? Esta acción no se puede deshacer. Si está en uso, el sistema lo bloqueará.')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
