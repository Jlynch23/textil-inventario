<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Nueva Recepción</title></head>
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- SUBIDA DE PDF -->
            <div class="card mb-4 border-primary">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3"><i class="bi bi-file-earmark-arrow-up me-2"></i>Subir Guía PDF (opcional)</h6>
                    <p class="text-muted small mb-3">Sube el PDF de la guía de FAST DYE y el sistema autocompletará los datos automáticamente. Podrás revisar y corregir antes de guardar.</p>
                    <div class="input-group">
                        <input type="file" id="pdfInput" class="form-control" accept="application/pdf">
                        <button type="button" id="btnExtraer" class="btn btn-primary">
                            <i class="bi bi-magic me-1"></i>Extraer Datos
                        </button>
                    </div>
                    <div id="extraccionEstado" class="mt-2"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-4">Datos de la Guía de Remisión</h6>
                    <form id="formRecepcion">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Empresa</label>
                            <select class="form-select" id="empresaId" name="empresaId" required>
                                <option value="">Seleccionar empresa...</option>
                                <option th:each="e : ${empresas}"
                                        th:value="${e.id}"
                                        th:text="${e.nombre}"></option>
                            </select>
                            <small id="empresaHint" class="text-muted"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Número de Guía</label>
                            <input type="text" class="form-control" id="numeroGuia" name="numeroGuia"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Número de Factura</label>
                            <input type="text" class="form-control" id="numeroFactura" name="numeroFactura">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Fecha de la Guía</label>
                            <input type="date" class="form-control" id="fechaGuia" name="fechaGuia" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Observaciones</label>
                            <textarea class="form-control" id="observaciones" name="observaciones" rows="2"></textarea>
                        </div>

                        <!-- LINEAS DE PRODUCTOS (se llenan al extraer PDF) -->
                        <div id="lineasContainer" style="display:none;">
                            <h6 class="fw-bold mb-3">Productos Detectados</h6>
                            <div class="table-responsive mb-3">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Artículo</th>
                                            <th>Color</th>
                                            <th>Código</th>
                                            <th>Programa</th>
                                            <th>Rollos</th>
                                            <th>Peso Bruto</th>
                                        </tr>
                                    </thead>
                                    <tbody id="lineasBody"></tbody>
                                </table>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-arrow-right me-2"></i>Continuar
                        </button>
                        <a th:href="@{/recepciones}" class="btn btn-light w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

<div class="modal fade" id="modalColorRapido" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-bold">Crear Color Nuevo</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre del Color</label>
                    <input type="text" class="form-control" id="modalColorNombre">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Código FAST DYE</label>
                    <input type="text" class="form-control" id="modalColorCodigo">
                </div>
                <div id="modalColorError" class="text-danger small"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnGuardarColorRapido">Crear Color</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const articulos = /*[[${articulos}]]*/ [];
    let lineasExtraidas = [];

    function articuloLabel(a) {
        return a.tipoTela.nombre + ' ' + a.titulo.valor + ' / ' + (a.composicion ? a.composicion.nombre : '')
             + (a.acabado && a.acabado.nombre !== 'LISO' ? ' · ' + a.acabado.nombre : '');
    }

    document.getElementById('btnExtraer').addEventListener('click', async () => {
        const fileInput = document.getElementById('pdfInput');
        if (!fileInput.files.length) {
            alert('Selecciona un archivo PDF primero.');
            return;
        }

        const estadoDiv = document.getElementById('extraccionEstado');
        estadoDiv.innerHTML = '<span class="text-primary"><i class="bi bi-hourglass-split me-1"></i>Leyendo guía con IA, espera un momento...</span>';

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const resp = await fetchConCsrf('/recepciones/extraer-guia', {
                method: 'POST',
                body: formData
            });

            if (!resp.ok) {
                const err = await resp.json();
                estadoDiv.innerHTML = '<span class="text-danger">Error: ' + (err.error || 'No se pudo procesar el PDF') + '</span>';
                return;
            }

            const data = await resp.json();

            document.getElementById('numeroGuia').value = data.numeroGuia || '';
            document.getElementById('numeroFactura').value = data.numeroFactura || '';
            document.getElementById('fechaGuia').value = data.fechaGuia || '';

            const empresaHint = document.getElementById('empresaHint');
            if (data.empresaIdSugerida) {
                document.getElementById('empresaId').value = data.empresaIdSugerida;
                empresaHint.innerHTML = 'Sugerido a partir de: "' + data.empresaNombreDetectado + '" — verifica que sea correcto.';
                empresaHint.className = 'text-warning';
            } else {
                empresaHint.innerHTML = 'No se pudo sugerir la empresa automáticamente (detectado: "' + (data.empresaNombreDetectado || '-') + '"). Selecciónala manualmente.';
                empresaHint.className = 'text-danger';
            }

            lineasExtraidas = data.lineas || [];
            renderLineas();

            let mensajeEstado = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>Datos extraídos correctamente.</span>';
            if (data.advertencia) {
                mensajeEstado += '<br><span class="text-warning small">' + data.advertencia + '</span>';
            }
            estadoDiv.innerHTML = mensajeEstado;

        } catch (e) {
            estadoDiv.innerHTML = '<span class="text-danger">Error de conexión: ' + e.message + '</span>';
        }
    });

    let idxColorPendiente = null;

    function renderLineas() {
        const tbody = document.getElementById('lineasBody');
        tbody.innerHTML = '';

        lineasExtraidas.forEach((linea, idx) => {
            const tr = document.createElement('tr');
            if (!linea.matched) tr.className = 'table-warning';

            let selectHtml = '<select class="form-select form-select-sm linea-articulo" data-idx="' + idx + '">';
            selectHtml += '<option value="">Seleccionar...</option>';
            articulos.forEach(a => {
                const selected = (linea.articuloId === a.id) ? 'selected' : '';
                selectHtml += '<option value="' + a.id + '" ' + selected + '>' + articuloLabel(a) + '</option>';
            });
            selectHtml += '</select>';

            if (!linea.matched) {
                selectHtml += '<br><small class="text-danger">' + linea.motivoNoMatch + '</small>';
                selectHtml += '<br><small class="text-muted">Tela detectada: ' + linea.tipoTela + ' ' + linea.titulo + ' / Composición: ' + (linea.composicion || '-') + ' / Acabado: ' + (linea.acabado || 'LISO') + '</small>';

                const motivoEsColor = linea.motivoNoMatch && linea.motivoNoMatch.indexOf('Color') !== -1 && linea.motivoNoMatch.indexOf('no existe') !== -1;
                // Si la composicion no se pudo identificar o no existe en el catalogo,
                // el endpoint de creacion rapida de articulo va a fallar igual (la
                // necesita para armar el articulo) -- se avisa en vez de ofrecer un
                // boton que va a fallar.
                // Solo aplica cuando la composicion en si falta o no existe en el
                // catalogo -- no cuando el mensaje generico de combinacion no
                // registrada menciona la palabra "composición" de pasada.
                const motivoEsComposicion = linea.motivoNoMatch && (
                    linea.motivoNoMatch.indexOf('No se pudo identificar la composici') !== -1 ||
                    linea.motivoNoMatch.indexOf("Composición '") !== -1);
                if (motivoEsComposicion) {
                    selectHtml += '<br><small class="text-warning"><i class="bi bi-exclamation-triangle me-1"></i>Agrega esta composición en Catálogo &gt; Artículos antes de continuar.</small>';
                } else if (!motivoEsColor) {
                    selectHtml += '<br><button type="button" class="btn btn-sm btn-outline-success mt-1 btn-crear-articulo" data-idx="' + idx + '">' +
                                  '<i class="bi bi-plus-circle me-1"></i>Crear artículo</button>';
                }
            }

            let colorCell = '';
            if (linea.colorNombre) {
                colorCell = linea.colorNombre;
                // El boton de crear color solo tiene sentido si el color NO se
                // resolvio (colorId vacio); si la linea no matchea por otra razon
                // (ej. falta el articulo), ofrecerlo solo genera duplicados.
                if (!linea.matched && !linea.colorId) {
                    colorCell += '<br><button type="button" class="btn btn-sm btn-outline-primary mt-1 btn-crear-color" data-idx="' + idx + '">' +
                                 '<i class="bi bi-plus-circle me-1"></i>Crear color</button>';
                }
            }

            tr.innerHTML = `
                <td>${selectHtml}</td>
                <td class="linea-color-cell">${colorCell}</td>
                <td><span class="badge bg-light text-dark">${linea.colorCodigo || ''}</span></td>
                <td><input type="text" class="form-control form-control-sm linea-programa" data-idx="${idx}" value="${linea.programaTenido || ''}"></td>
                <td><input type="number" class="form-control form-control-sm linea-rollos" data-idx="${idx}" value="${linea.rollosGuia || ''}"></td>
                <td><input type="number" step="0.01" class="form-control form-control-sm linea-peso" data-idx="${idx}" value="${linea.pesoBrutoKg || ''}"></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('lineasContainer').style.display = lineasExtraidas.length ? 'block' : 'none';

        document.querySelectorAll('.btn-crear-color').forEach(btn => {
            btn.addEventListener('click', () => {
                idxColorPendiente = parseInt(btn.dataset.idx);
                const linea = lineasExtraidas[idxColorPendiente];
                document.getElementById('modalColorNombre').value = linea.colorNombre || '';
                document.getElementById('modalColorCodigo').value = linea.colorCodigo || '';
                document.getElementById('modalColorError').textContent = '';
                new bootstrap.Modal(document.getElementById('modalColorRapido')).show();
            });
        });

        engancharBotonesArticulo();
    }

    function engancharBotonesArticulo() {
        document.querySelectorAll('.btn-crear-articulo').forEach(btn => {
            btn.addEventListener('click', async () => {
            const idx = parseInt(btn.dataset.idx);
            const linea = lineasExtraidas[idx];
            btn.disabled = true;
            btn.textContent = 'Creando...';

            try {
                const resp = await fetchConCsrf('/catalogo/articulos/crear-rapido', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipoTelaNombre: linea.tipoTela,
                        tituloValor: linea.titulo,
                        composicionNombre: linea.composicion,
                        acabadoNombre: linea.acabado
                    })
                });
                const data = await resp.json();

                if (!resp.ok) {
                    alert('Error: ' + data.error);
                    btn.disabled = false;
                    btn.textContent = 'Crear artículo';
                    return;
                }

                const nuevoId = data.id;
                if (!articulos.find(a => a.id === nuevoId)) {
                    articulos.push({
                        id: nuevoId,
                        tipoTela: { nombre: linea.tipoTela },
                        titulo: { valor: linea.titulo },
                        composicion: { nombre: linea.composicion },
                        acabado: { nombre: linea.acabado || 'LISO' }
                    });
                }

                const resultado = await fetchConCsrf('/recepciones/rematch-linea', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipoTela: linea.tipoTela,
                        titulo: linea.titulo,
                        composicion: linea.composicion,
                        acabado: linea.acabado,
                        colorCodigo: linea.colorCodigo,
                        colorNombre: linea.colorNombre,
                        programaTenido: linea.programaTenido,
                        rollos: linea.rollosGuia,
                        pesoBrutoKg: linea.pesoBrutoKg
                    })
                });
                const nuevaLinea = await resultado.json();
                lineasExtraidas[idx] = nuevaLinea;
                renderLineas();

            } catch (e) {
                alert('Error de conexión: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Crear artículo';
            }
        });
    });
    }

    document.getElementById('btnGuardarColorRapido').addEventListener('click', async () => {
        const nombreOficial = document.getElementById('modalColorNombre').value.trim();
        const codigoFastDye = document.getElementById('modalColorCodigo').value.trim();
        const errorDiv = document.getElementById('modalColorError');

        if (!nombreOficial || !codigoFastDye) {
            errorDiv.textContent = 'Nombre y código son obligatorios.';
            return;
        }

        try {
            const resp = await fetchConCsrf('/catalogo/colores/crear-rapido', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombreOficial, codigoFastDye })
            });
            const data = await resp.json();

            if (!resp.ok) {
                errorDiv.textContent = data.error || 'Error al crear el color.';
                return;
            }

            articulos.push({
                id: -1,
                tipoTela: { nombre: '(nuevo color, revisa el articulo)' },
                titulo: { valor: '' },
                composicion: { nombre: '' },
                acabado: { nombre: '' }
            });

            const linea = lineasExtraidas[idxColorPendiente];
            const resultado = await fetchConCsrf('/recepciones/rematch-linea', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tipoTela: linea.tipoTela,
                    titulo: linea.titulo,
                    composicion: linea.composicion,
                    acabado: linea.acabado,
                    colorCodigo: linea.colorCodigo,
                    colorNombre: linea.colorNombre,
                    programaTenido: linea.programaTenido,
                    rollos: linea.rollosGuia,
                    pesoBrutoKg: linea.pesoBrutoKg
                })
            });
            const nuevaLinea = await resultado.json();
            lineasExtraidas[idxColorPendiente] = nuevaLinea;

            bootstrap.Modal.getInstance(document.getElementById('modalColorRapido')).hide();
            renderLineas();

        } catch (e) {
            errorDiv.textContent = 'Error de conexión: ' + e.message;
        }
    });

    document.getElementById('formRecepcion').addEventListener('submit', async (e) => {
        e.preventDefault();

        const empresaId = document.getElementById('empresaId').value;
        const numeroGuia = document.getElementById('numeroGuia').value;

        if (numeroGuia) {
            try {
                const chkResp = await fetch('/recepciones/verificar-guia?numero=' + encodeURIComponent(numeroGuia));
                const chkData = await chkResp.json();
                if (chkData.existe) {
                    const confirmar = confirm(
                        '⚠️ Ya existe una guía con el número "' + numeroGuia + '"\n\n' +
                        'Empresa: ' + chkData.empresa + '\n' +
                        'Fecha: ' + chkData.fecha + '\n' +
                        'Estado: ' + chkData.estado + '\n\n' +
                        '¿Estás seguro de que quieres registrarla de nuevo? Esto puede duplicar el stock.'
                    );
                    if (!confirmar) return;
                }
            } catch (err) {
                console.error('No se pudo verificar duplicado de guía:', err);
            }
        }
        const fechaGuia = document.getElementById('fechaGuia').value;
        const observaciones = document.getElementById('observaciones').value;

        if (!empresaId || !numeroGuia || !fechaGuia) {
            alert('Completa los campos obligatorios.');
            return;
        }

        const lineas = [];
        document.querySelectorAll('.linea-articulo').forEach(sel => {
            const idx = sel.dataset.idx;
            const articuloId = sel.value;
            if (!articuloId) return;
            const colorId = lineasExtraidas[idx] ? lineasExtraidas[idx].colorId : null;
            if (!colorId) return;
            const programa = document.querySelector('.linea-programa[data-idx="' + idx + '"]').value;
            const rollos = document.querySelector('.linea-rollos[data-idx="' + idx + '"]').value;
            const peso = document.querySelector('.linea-peso[data-idx="' + idx + '"]').value;
            lineas.push({
                articuloId: parseInt(articuloId),
                colorId: parseInt(colorId),
                programaTenido: programa,
                rollosGuia: parseInt(rollos),
                pesoBrutoKg: peso ? parseFloat(peso) : null
            });
        });

        if (lineasExtraidas.length > 0 && lineas.length > 0) {
            const numeroFactura = document.getElementById('numeroFactura').value;
            const resp = await fetchConCsrf('/recepciones/crear-con-lineas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ empresaId: parseInt(empresaId), numeroGuia, numeroFactura, fechaGuia, observaciones, lineas })
            });
            const data = await resp.json();
            if (resp.ok) {
                const fileInput = document.getElementById('pdfInput');
                if (fileInput.files.length > 0) {
                    const fd = new FormData();
                    fd.append('file', fileInput.files[0]);
                    try {
                        const respDoc = await fetchConCsrf('/recepciones/' + data.id + '/guardar-documento-guia', { method: 'POST', body: fd });
                        if (!respDoc.ok) {
                            let msg = 'HTTP ' + respDoc.status;
                            try { const ed = await respDoc.json(); if (ed && ed.error) msg = ed.error; } catch (e) {}
                            alert('La recepción se creó, pero NO se pudo archivar el PDF de la guía:\n' + msg +
                                  '\n\nPodés volver a subirlo desde el detalle de la recepción.');
                        }
                    } catch (err) {
                        alert('La recepción se creó, pero NO se pudo archivar el PDF de la guía (error de red):\n' + err.message);
                    }
                } else {
                    alert('Aviso: la recepción se creó SIN adjuntar el PDF de la guía porque no había ningún archivo seleccionado en el campo de subida.');
                }
                window.location.href = data.redirectUrl;
            } else {
                alert('Error: ' + data.error);
            }
        } else {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = /*[[@{/recepciones/crear}]]*/ '/recepciones/crear';
            const numeroFacturaFallback = document.getElementById('numeroFactura').value;
            const camposForm = [
                { nombre: 'empresaId', valor: empresaId },
                { nombre: 'numeroGuia', valor: numeroGuia },
                { nombre: 'numeroFactura', valor: numeroFacturaFallback },
                { nombre: 'fechaGuia', valor: fechaGuia },
                { nombre: 'observaciones', valor: observaciones }
            ];
            camposForm.forEach(function(campo) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = campo.nombre;
                input.value = campo.valor;
                form.appendChild(input);
            });
            const csrfToken = document.querySelector('meta[name="_csrf"]');
            if (csrfToken) {
                const csrfInput = document.createElement('input');
                csrfInput.type = 'hidden';
                csrfInput.name = '_csrf';
                csrfInput.value = csrfToken.content;
                form.appendChild(csrfInput);
            }
            document.body.appendChild(form);
            form.submit();
        }
    });
</script>
</section>
</body>
</html>
