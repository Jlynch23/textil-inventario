<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacén</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #1F4E79; min-height: 100vh; display: flex; align-items: center; }
        .btn-grande {
            font-size: 1.4rem;
            padding: 40px 20px;
            border-radius: 16px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mb-5">
        <h3 class="text-white fw-bold">Textil Inventario</h3>
        <p class="text-white-50">Panel de Almacén</p>
    </div>
    <div class="row g-3">
        <div class="col-12">
            <a href="/almacen/entrada" class="btn btn-success btn-grande w-100 d-flex flex-column align-items-center">
                <i class="bi bi-box-arrow-in-down" style="font-size: 3rem;"></i>
                Registrar ENTRADA
            </a>
        </div>
        <div class="col-12">
            <a href="/almacen/salida" class="btn btn-warning btn-grande w-100 d-flex flex-column align-items-center">
                <i class="bi bi-box-arrow-up" style="font-size: 3rem;"></i>
                Registrar SALIDA
            </a>
        </div>
        <div class="col-12 mt-4">
            <a href="/logout" class="btn btn-outline-light w-100">
                <i class="bi bi-box-arrow-left me-2"></i>Cerrar Sesión
            </a>
        </div>
    </div>
</div>
</body>
</html>
