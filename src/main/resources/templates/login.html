<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TexControl</title>

    <!-- PWA: app movil instalable (tambien desde la pantalla de login) -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0b1220">
    <link rel="apple-touch-icon" href="/img/pwa/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TexControl">
    <script src="/js/pwa-register.js" defer></script>
    <style>
        :root { --azul:#1a82f0; --azul-oscuro:#1568c8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(1200px 600px at 50% -10%, #16233b 0%, #0b1220 60%, #070c16 100%);
            padding: 20px;
        }
        .card {
            background: #0f1a2e;
            border: 1px solid rgba(148,163,184,.14);
            border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.55);
            width: 100%; max-width: 440px; padding: 40px 38px; text-align: center;
        }
        .logo { width: 100%; max-width: 270px; height: auto; margin: 0 auto 10px; display: block; }
        .sub { color: #93a4bd; font-size: 14px; margin-top: 2px; margin-bottom: 28px; }
        label { display:block; text-align:left; font-weight:600; font-size:14px; margin-bottom:8px; color:#dbe4f0; }
        .campo { display: flex; align-items: stretch; border: 1px solid #2b3a53; border-radius: 10px; overflow: hidden; background:#0b1424; margin-bottom: 18px; }
        .campo:focus-within { border-color: var(--azul); box-shadow: 0 0 0 3px rgba(26,130,240,.20); }
        .campo input { flex: 1; border: none; outline: none; padding: 12px 14px; font-size: 16px; min-width: 0; background: transparent; color: #f1f5f9; }
        button {
            margin-top: 6px; width: 100%; background: var(--azul); color: #fff; border: none;
            padding: 13px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: background .15s;
        }
        button:hover { background: var(--azul-oscuro); }
        .alerta { border-radius: 10px; padding: 11px 14px; font-size: 14px; margin-bottom: 22px; text-align: left; }
        .alerta-error { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.35); color: #fca5a5; }
        .alerta-ok { background: rgba(52,211,153,.12); border: 1px solid rgba(52,211,153,.35); color: #6ee7b7; }
        .volver { display: inline-block; margin-top: 22px; color: #7c8ba6; font-size: 13.5px; text-decoration: none; }
        .volver:hover { color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="/img/texcontrol-logo-recortado.png" alt="TexControl">
        <div class="sub">Control total para la industria textil</div>

        <div th:if="${param.error}" class="alerta alerta-error">
            Usuario o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="alerta alerta-ok">
            Sesión cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="username">Usuario</label>
            <div class="campo">
                <input type="text" id="username" name="username" autocomplete="username"
                       required autofocus>
            </div>

            <label for="password">Contraseña</label>
            <div class="campo">
                <input type="password" id="password" name="password"
                       autocomplete="current-password" required>
            </div>

            <button type="submit">Ingresar &rarr;</button>
        </form>

        <a class="volver" href="https://texcontrol.pe">&larr; Volver a la página principal</a>
    </div>

    <script>
        // Cada vez que se llega a esta pantalla (entre una sesion y la
        // siguiente) se limpia la preferencia guardada del sidebar de
        // GERENTE, para que la proxima sesion siempre arranque con el
        // menu oculto, sin importar si en la sesion anterior lo abrieron.
        localStorage.removeItem('sidebarColapsadoGerente');
    </script>
</body>
</html>
