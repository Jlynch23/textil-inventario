<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(titulo, contenido)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - Textil Inventario'">Textil Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .sidebar {
            min-height: 100vh;
            background-color: #1F4E79;
            width: 240px;
            position: fixed;
            top: 0; left: 0;
        }
        .sidebar .brand {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .brand h6 { color: white; margin: 0; font-weight: 700; font-size: 0.95rem; }
        .sidebar .brand small { color: rgba(255,255,255,0.6); font-size: 0.75rem; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.75);
            padding: 10px 16px;
            font-size: 0.875rem;
            border-radius: 6px;
            margin: 2px 8px;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background-color: rgba(255,255,255,0.15);
            color: white;
        }
        .sidebar .nav-section {
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 16px 4px;
        }
        .main-content { margin-left: 240px; padding: 24px; }
        .topbar {
            background: white;
            border-bottom: 1px solid #dee2e6;
            padding: 12px 24px;
            margin-left: 240px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .card { border: none; box-shadow: 0 1px 8px rgba(0,0,0,0.07); border-radius: 10px; }
        .btn-primary { background-color: #1F4E79; border-color: #1F4E79; }
        .btn-primary:hover { background-color: #163a5f; border-color: #163a5f; }
        .table th { background-color: #f8f9fa; font-size: 0.8rem; text-transform: uppercase; color: #6c757d; }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="brand">
            <h6>Textil Inventario</h6>
            <small>Laura &amp; Clemente</small>
        </div>
        <nav class="mt-2">
            <div class="nav-section">Principal</div>
            <a th:href="@{/}" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>

            <div class="nav-section">Inventario</div>
            <a th:href="@{/inventario/stock}" class="nav-link"><i class="bi bi-boxes me-2"></i>Stock Actual</a>
            <a th:href="@{/inventario/kardex}" class="nav-link"><i class="bi bi-journal-text me-2"></i>Kardex</a>

            <div class="nav-section">Operaciones</div>
            <a th:href="@{/recepciones}" class="nav-link"><i class="bi bi-truck me-2"></i>Recepciones</a>
            <a th:href="@{/programas}" class="nav-link"><i class="bi bi-list-check me-2"></i>Programas</a>
            <a th:href="@{/transferencias}" class="nav-link"><i class="bi bi-arrow-left-right me-2"></i>Transferencias</a>
            <a th:href="@{/documentos}" class="nav-link"><i class="bi bi-file-earmark-pdf me-2"></i>Documentos</a>

            <div class="nav-section">Catálogo</div>
            <a th:href="@{/catalogo/colores}" class="nav-link"><i class="bi bi-palette me-2"></i>Colores</a>
            <a th:href="@{/catalogo/articulos}" class="nav-link"><i class="bi bi-tags me-2"></i>Artículos</a>
            <a th:href="@{/catalogo/ubicaciones}" class="nav-link"><i class="bi bi-geo-alt me-2"></i>Ubicaciones</a>
        </nav>
        <div style="position:absolute; bottom:0; width:100%; padding:16px; border-top:1px solid rgba(255,255,255,0.1);">
            <a th:href="@{/logout}" class="nav-link text-center"><i class="bi bi-box-arrow-left me-2"></i>Cerrar Sesión</a>
        </div>
    </div>

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold" th:text="${titulo}">Título</h5>
        <span class="text-muted small"><i class="bi bi-person-circle me-1"></i>Administrador</span>
    </div>

    <!-- CONTENIDO -->
    <div class="main-content">
        <div th:replace="${contenido}">Contenido aquí</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
