<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Documentos</title></head>
<body>
<section>
    <h5 class="fw-bold mb-4">Documentos Archivados</h5>

    <div class="card mb-4">
        <div class="card-body p-3">
            <form method="get" th:action="@{/documentos}" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Empresa</label>
                    <select class="form-select form-select-sm" name="empresaId">
                        <option value="">Todas</option>
                        <option th:each="e : ${empresas}" th:value="${e.id}" th:text="${e.nombre}"
                                th:selected="${e.id == filtroEmpresaId}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Tipo</label>
                    <select class="form-select form-select-sm" name="tipoDocumento">
                        <option value="">Todos</option>
                        <option value="GUIA" th:selected="${filtroTipo == 'GUIA'}">Guía</option>
                        <option value="FACTURA" th:selected="${filtroTipo == 'FACTURA'}">Factura</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Año</label>
                    <input type="number" class="form-control form-control-sm" name="anio" th:value="${filtroAnio}" placeholder="2026">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Mes</label>
                    <select class="form-select form-select-sm" name="mes">
                        <option value="">Todos</option>
                        <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="${m}"
                                th:selected="${m == filtroMes}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary btn-sm w-100">Filtrar</button>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/documentos}" class="btn btn-outline-secondary btn-sm w-100">Limpiar filtros</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                <span class="fw-bold" th:text="${documentos.size()} + ' documento(s)'"></span>
                <button type="button" class="btn btn-success btn-sm" id="btnDescargarZip" sec:authorize="hasRole('SUPERADMIN')" disabled>
                    <i class="bi bi-file-earmark-zip me-1"></i>Descargar seleccionados (.zip)
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th style="width:40px;"><input type="checkbox" id="chkTodos"></th>
                            <th>Tipo</th>
                            <th>Empresa</th>
                            <th>Número</th>
                            <th>Archivo</th>
                            <th>Fecha Archivado</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${documentos.empty}">
                            <td colspan="7" class="text-center text-muted py-4">Sin documentos para estos filtros.</td>
                        </tr>
                        <tr th:each="d : ${documentos}">
                            <td><input type="checkbox" class="chk-doc" th:value="${d.id}"></td>
                            <td>
                                <span th:if="${d.tipoDocumento == 'GUIA'}" class="badge bg-primary">Guía</span>
                                <span th:if="${d.tipoDocumento == 'FACTURA'}" class="badge bg-success">Factura</span>
                            </td>
                            <td th:text="${d.recepcion.empresa.nombre}"></td>
                            <td>
                                <code th:if="${d.tipoDocumento == 'FACTURA'}" th:text="${d.recepcion.numeroFactura}"></code>
                                <code th:unless="${d.tipoDocumento == 'FACTURA'}" th:text="${d.recepcion.numeroGuia}"></code>
                            </td>
                            <td th:text="${d.nombreOriginal}"></td>
                            <td th:text="${#temporals.format(d.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <a th:href="@{/documentos/{id}/ver(id=${d.id})}" target="_blank" class="btn btn-sm btn-outline-secondary" title="Ver PDF">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/documentos/{id}/descargar(id=${d.id})}" class="btn btn-sm btn-outline-primary" title="Descargar">
                                    <i class="bi bi-download"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function actualizarBoton() {
            const seleccionados = document.querySelectorAll('.chk-doc:checked').length;
            document.getElementById('btnDescargarZip').disabled = seleccionados === 0;
        }

        document.getElementById('chkTodos').addEventListener('change', (e) => {
            document.querySelectorAll('.chk-doc').forEach(chk => chk.checked = e.target.checked);
            actualizarBoton();
        });

        document.querySelectorAll('.chk-doc').forEach(chk => chk.addEventListener('change', actualizarBoton));

        document.getElementById('btnDescargarZip').addEventListener('click', async () => {
            const ids = Array.from(document.querySelectorAll('.chk-doc:checked')).map(c => c.value);

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/documentos/descargar-zip';
            ids.forEach(id => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'ids';
                input.value = id;
                form.appendChild(input);
            });
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        });
    </script>
</section>
</body>
</html>
