<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Programas</title></head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">Programas</h5>
        <a th:href="@{/programas/nuevo}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Programa
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Número</th>
                            <th>Empresa</th>
                            <th>Fecha</th>
                            <th>Colores</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${programas.empty}">
                            <td colspan="4" class="text-center text-muted py-4">Sin programas registrados.</td>
                        </tr>
                        <tr th:each="p : ${programas}" style="cursor:pointer;"
                            th:onclick="'window.location=\'' + @{/programas/{id}(id=${p.id})} + '\''">
                            <td><code th:text="${p.numero}"></code></td>
                            <td th:text="${p.empresa.nombre}"></td>
                            <td th:text="${p.fecha}"></td>
                            <td th:text="${p.detalles.size()}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
