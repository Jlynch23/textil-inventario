<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Programa</title></head>
<body>
<section>
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card mb-4">
        <div class="card-body p-4">
            <div class="row">
                <div class="col-md-3">
                    <small class="text-muted">Programa</small>
                    <p class="fs-3 fw-bold mb-0 text-primary" th:text="${programa.numero}"></p>
                </div>
                <div class="col-md-3">
                    <small class="text-muted">Empresa</small>
                    <p class="fw-bold mb-0" th:text="${programa.empresa.nombre}"></p>
                </div>
                <div class="col-md-3">
                    <small class="text-muted">Fecha</small>
                    <p class="fw-bold mb-0" th:text="${programa.fecha}"></p>
                </div>
                <div class="col-md-3">
                    <small class="text-muted">Total de Rollos</small>
                    <p class="fw-bold mb-0" th:text="${programa.totalRollos}"></p>
                </div>
                <div class="col-md-3">
                    <small class="text-muted">Observaciones</small>
                    <p class="fw-bold mb-0" th:text="${programa.observaciones ?: '-'}"></p>
                </div>
            </div>
        </div>
    </div>
    <div class="card">
        <div class="card-body p-0">
            <div class="p-3 border-bottom fw-bold">Seguimiento por Color</div>
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Tipo de Tela</th>
                            <th>Título</th>
                            <th>Color</th>
                            <th>Código</th>
                            <th>Solicitado</th>
                            <th>Recibido</th>
                            <th>Pendiente</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${programa.detalles}">
                            <td th:text="${d.articulo.tipoTela.nombre}"></td>
                            <td th:text="${d.articulo.titulo.valor}"></td>
                            <td th:text="${d.articulo.color.nombreOficial}"></td>
                            <td><span class="badge bg-light text-dark" th:text="${d.articulo.color.codigoFastDye}"></span></td>
                            <td th:text="${d.cantidadSolicitada}"></td>
                            <td th:text="${d.cantidadRecibida}"></td>
                            <td th:text="${d.cantidadPendiente}"></td>
                            <td>
                                <div th:if="${d.completo}" class="d-flex align-items-center gap-2 flex-wrap">
                                    <span class="badge bg-success">Completo</span>
                                    <span th:each="hg : ${historialPorLinea.get(d.id)}" class="d-inline-flex align-items-center gap-1">
                                        <a th:if="${hg.documentoId != null}"
                                           th:href="@{/documentos/{docId}/ver(docId=${hg.documentoId})}"
                                           target="_blank" title="Ver guía"
                                           class="text-decoration-none">
                                            <i class="bi bi-eye"></i> <small th:text="${hg.numeroGuia}"></small>
                                        </a>
                                        <small th:unless="${hg.documentoId != null}" class="text-muted" th:text="${hg.numeroGuia}"></small>
                                    </span>
                                </div>
                                <span th:unless="${d.completo}" class="badge bg-warning text-dark">Pendiente</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <a th:href="@{/programas}" class="btn btn-light mt-3">← Volver a Programas</a>
    <a th:unless="${programa.completo}" th:href="@{/programas/{id}/editar(id=${programa.id})}" class="btn btn-primary mt-3"><i class="bi bi-pencil"></i> Editar Programa</a>
</section>
</body>
</html>
