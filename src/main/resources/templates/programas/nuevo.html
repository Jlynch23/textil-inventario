<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Nuevo Programa</title></head>
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-11">
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-4">Nuevo Programa</h6>
                    <form th:action="@{/programas/crear}" method="post" id="formPrograma">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Número de Programa</label>
                                <input type="text" class="form-control" name="numero" placeholder="Ej: 659" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Empresa</label>
                                <select class="form-select" name="empresaId" required>
                                    <option value="">Seleccionar...</option>
                                    <option th:each="e : ${empresas}" th:value="${e.id}" th:text="${e.nombre}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Fecha</label>
                                <input type="date" class="form-control" name="fecha" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Total de Rollos</label>
                                <input type="number" class="form-control" name="totalRollos" id="inputTotalRollos" min="1" required>
                                <small id="sumaIndicador" class="fw-semibold"></small>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Observaciones</label>
                            <textarea class="form-control" name="observaciones" rows="2"></textarea>
                        </div>

                        <h6 class="fw-bold mb-3">Artículos Solicitados</h6>
                        <div class="row g-2 mb-1 d-none d-md-flex">
                            <div class="col-md-3"><small class="text-muted fw-semibold">Tipo de Tela</small></div>
                            <div class="col-md-2"><small class="text-muted fw-semibold">Título</small></div>
                            <div class="col-md-3"><small class="text-muted fw-semibold">Color</small></div>
                            <div class="col-md-2"><small class="text-muted fw-semibold">Cantidad</small></div>
                        </div>
                        <div id="lineasContainer">
                            <div class="row g-2 mb-2 linea-color">
                                <div class="col-md-3">
                                    <div class="input-group">
                                        <select class="form-select select-tipo-tela" name="tipoTelaId">
                                            <option value="">Tipo de tela...</option>
                                            <option th:each="t : ${tiposTela}" th:value="${t.id}" th:text="${t.nombre}"></option>
                                        </select>
                                        <button type="button" class="btn btn-outline-primary btn-tipotela-nuevo" title="Crear tipo de tela nuevo"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="col-md-2">
                                    <div class="input-group">
                                        <select class="form-select select-titulo" name="tituloId">
                                            <option value="">Título...</option>
                                            <option th:each="ti : ${titulos}" th:value="${ti.id}" th:text="${ti.valor}"></option>
                                        </select>
                                        <button type="button" class="btn btn-outline-primary btn-titulo-nuevo" title="Crear título nuevo"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="input-group">
                                        <select class="form-select select-color" name="colorId">
                                            <option value="">Color...</option>
                                            <option th:each="c : ${colores}" th:value="${c.id}"
                                                    th:text="${c.nombreOficial + ' (' + c.codigoFastDye + ')'}"></option>
                                        </select>
                                        <button type="button" class="btn btn-outline-primary btn-color-nuevo" title="Crear color nuevo"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="col-md-2">
                                    <input type="number" class="form-control input-cantidad" name="cantidad" placeholder="Cantidad" min="1">
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-outline-danger w-100 btn-quitar-linea">✕ Quitar</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-outline-primary btn-sm mb-4" id="btnAgregarLinea">
                            <i class="bi bi-plus-lg me-1"></i>Agregar otra línea
                        </button>

                        <button type="submit" class="btn btn-primary w-100">Crear Programa</button>
                        <a th:href="@{/programas}" class="btn btn-light w-100 mt-2">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Tipo de Tela nuevo -->
    <div class="modal fade" id="modalTipoTelaPrograma" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold">Crear Tipo de Tela Nuevo</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label fw-semibold">Nombre</label>
                    <input type="text" class="form-control" id="modalTipoTelaNombre" placeholder="Ej: RIB 3x1">
                    <div id="modalTipoTelaError" class="text-danger small mt-2"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnGuardarTipoTelaPrograma">Crear</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Título nuevo -->
    <div class="modal fade" id="modalTituloPrograma" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold">Crear Título Nuevo</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label fw-semibold">Valor</label>
                    <input type="text" class="form-control" id="modalTituloValor" placeholder="Ej: 28/1">
                    <div id="modalTituloError" class="text-danger small mt-2"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnGuardarTituloPrograma">Crear</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Color nuevo -->
    <div class="modal fade" id="modalColorRapidoPrograma" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold">Crear Color Nuevo</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre del Color</label>
                        <input type="text" class="form-control" id="modalColorNombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Código FAST DYE</label>
                        <input type="text" class="form-control" id="modalColorCodigo">
                    </div>
                    <div id="modalColorError" class="text-danger small"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnGuardarColorRapidoPrograma">Crear Color</button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const tiposTelaData = /*[[${tiposTela}]]*/ [];
        const titulosData = /*[[${titulos}]]*/ [];
        let coloresData = /*[[${colores}]]*/ [];
        let selectColorActual = null;
        let selectTipoTelaActual = null;
        let selectTituloActual = null;

        function opcionesColores(seleccionarId) {
            let options = '<option value="">Color...</option>';
            coloresData.forEach(c => {
                const sel = seleccionarId && c.id === seleccionarId ? ' selected' : '';
                options += '<option value="' + c.id + '"' + sel + '>' + c.nombreOficial + ' (' + c.codigoFastDye + ')</option>';
            });
            return options;
        }
        function opcionesTipoTela(seleccionarId) {
            let options = '<option value="">Tipo de tela...</option>';
            tiposTelaData.forEach(t => {
                const sel = seleccionarId && t.id === seleccionarId ? ' selected' : '';
                options += '<option value="' + t.id + '"' + sel + '>' + t.nombre + '</option>';
            });
            return options;
        }
        function opcionesTitulos(seleccionarId) {
            let options = '<option value="">Título...</option>';
            titulosData.forEach(ti => {
                const sel = seleccionarId && ti.id === seleccionarId ? ' selected' : '';
                options += '<option value="' + ti.id + '"' + sel + '>' + ti.valor + '</option>';
            });
            return options;
        }

        function buildLineaHtml() {
            return '<div class="row g-2 mb-2 linea-color">' +
                   '<div class="col-md-3"><div class="input-group"><select class="form-select select-tipo-tela" name="tipoTelaId">' + opcionesTipoTela() + '</select>' +
                   '<button type="button" class="btn btn-outline-primary btn-tipotela-nuevo" title="Crear tipo de tela nuevo"><i class="bi bi-plus-lg"></i></button></div></div>' +
                   '<div class="col-md-2"><div class="input-group"><select class="form-select select-titulo" name="tituloId">' + opcionesTitulos() + '</select>' +
                   '<button type="button" class="btn btn-outline-primary btn-titulo-nuevo" title="Crear título nuevo"><i class="bi bi-plus-lg"></i></button></div></div>' +
                   '<div class="col-md-3"><div class="input-group"><select class="form-select select-color" name="colorId">' + opcionesColores() + '</select>' +
                   '<button type="button" class="btn btn-outline-primary btn-color-nuevo" title="Crear color nuevo"><i class="bi bi-plus-lg"></i></button></div></div>' +
                   '<div class="col-md-2"><input type="number" class="form-control input-cantidad" name="cantidad" placeholder="Cantidad" min="1"></div>' +
                   '<div class="col-md-2"><button type="button" class="btn btn-outline-danger w-100 btn-quitar-linea">✕ Quitar</button></div>' +
                   '</div>';
        }

        function actualizarSuma() {
            let suma = 0;
            document.querySelectorAll('.input-cantidad').forEach(inp => { suma += parseInt(inp.value) || 0; });
            const totalEsperado = parseInt(document.getElementById('inputTotalRollos').value) || 0;
            const indicador = document.getElementById('sumaIndicador');
            if (totalEsperado === 0 && suma === 0) {
                indicador.textContent = '';
                return;
            }
            if (suma === totalEsperado) {
                indicador.className = 'fw-semibold text-success';
                indicador.textContent = '✓ Suma de líneas: ' + suma + ' (coincide)';
            } else {
                indicador.className = 'fw-semibold text-danger';
                indicador.textContent = 'Suma de líneas: ' + suma + ' — no coincide con el total (' + totalEsperado + ')';
            }
        }

        document.getElementById('inputTotalRollos').addEventListener('input', actualizarSuma);
        document.getElementById('lineasContainer').addEventListener('input', (e) => {
            if (e.target.classList.contains('input-cantidad')) actualizarSuma();
        });

        document.getElementById('formPrograma').addEventListener('submit', (e) => {
            let suma = 0;
            document.querySelectorAll('.input-cantidad').forEach(inp => { suma += parseInt(inp.value) || 0; });
            const totalEsperado = parseInt(document.getElementById('inputTotalRollos').value) || 0;
            if (suma !== totalEsperado) {
                e.preventDefault();
                alert('El total de rollos (' + totalEsperado + ') no coincide con la suma de las líneas (' + suma + '). Corrígelo antes de guardar.');
            }
        });

        document.getElementById('btnAgregarLinea').addEventListener('click', () => {
            const container = document.getElementById('lineasContainer');
            const div = document.createElement('div');
            div.innerHTML = buildLineaHtml();
            container.appendChild(div.firstChild);
            engancharBotones();
        });

        function engancharBotones() {
            document.querySelectorAll('.btn-quitar-linea').forEach(btn => {
                btn.onclick = () => {
                    if (document.querySelectorAll('.linea-color').length > 1) {
                        btn.closest('.linea-color').remove();
                        actualizarSuma();
                    }
                };
            });
            document.querySelectorAll('.btn-color-nuevo').forEach(btn => {
                btn.onclick = () => {
                    selectColorActual = btn.closest('.linea-color').querySelector('.select-color');
                    document.getElementById('modalColorNombre').value = '';
                    document.getElementById('modalColorCodigo').value = '';
                    document.getElementById('modalColorError').textContent = '';
                    new bootstrap.Modal(document.getElementById('modalColorRapidoPrograma')).show();
                };
            });
            document.querySelectorAll('.btn-tipotela-nuevo').forEach(btn => {
                btn.onclick = () => {
                    selectTipoTelaActual = btn.closest('.linea-color').querySelector('.select-tipo-tela');
                    document.getElementById('modalTipoTelaNombre').value = '';
                    document.getElementById('modalTipoTelaError').textContent = '';
                    new bootstrap.Modal(document.getElementById('modalTipoTelaPrograma')).show();
                };
            });
            document.querySelectorAll('.btn-titulo-nuevo').forEach(btn => {
                btn.onclick = () => {
                    selectTituloActual = btn.closest('.linea-color').querySelector('.select-titulo');
                    document.getElementById('modalTituloValor').value = '';
                    document.getElementById('modalTituloError').textContent = '';
                    new bootstrap.Modal(document.getElementById('modalTituloPrograma')).show();
                };
            });
        }
        engancharBotones();

        document.getElementById('btnGuardarColorRapidoPrograma').addEventListener('click', async () => {
            const nombreOficial = document.getElementById('modalColorNombre').value.trim();
            const codigoFastDye = document.getElementById('modalColorCodigo').value.trim();
            const errorDiv = document.getElementById('modalColorError');
            if (!nombreOficial || !codigoFastDye) { errorDiv.textContent = 'Nombre y código son obligatorios.'; return; }
            try {
                const resp = await fetchConCsrf('/catalogo/colores/crear-rapido', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombreOficial, codigoFastDye })
                });
                const data = await resp.json();
                if (!resp.ok) { errorDiv.textContent = data.error || 'Error al crear el color.'; return; }
                coloresData.push({ id: data.id, nombreOficial: data.nombreOficial, codigoFastDye: codigoFastDye });
                document.querySelectorAll('.select-color').forEach(sel => {
                    const idPreseleccionar = sel === selectColorActual ? data.id : null;
                    const valorActual = sel.value;
                    sel.innerHTML = opcionesColores(idPreseleccionar);
                    if (!idPreseleccionar && valorActual) sel.value = valorActual;
                });
                bootstrap.Modal.getInstance(document.getElementById('modalColorRapidoPrograma')).hide();
            } catch (e) { errorDiv.textContent = 'Error de conexión: ' + e.message; }
        });

        document.getElementById('btnGuardarTipoTelaPrograma').addEventListener('click', async () => {
            const nombre = document.getElementById('modalTipoTelaNombre').value.trim();
            const errorDiv = document.getElementById('modalTipoTelaError');
            if (!nombre) { errorDiv.textContent = 'El nombre es obligatorio.'; return; }
            try {
                const resp = await fetchConCsrf('/catalogo/tipos-tela/crear-rapido', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre })
                });
                const data = await resp.json();
                if (!resp.ok) { errorDiv.textContent = data.error || 'Error al crear.'; return; }
                tiposTelaData.push({ id: data.id, nombre: data.nombre });
                document.querySelectorAll('.select-tipo-tela').forEach(sel => {
                    const idPreseleccionar = sel === selectTipoTelaActual ? data.id : null;
                    const valorActual = sel.value;
                    sel.innerHTML = opcionesTipoTela(idPreseleccionar);
                    if (!idPreseleccionar && valorActual) sel.value = valorActual;
                });
                bootstrap.Modal.getInstance(document.getElementById('modalTipoTelaPrograma')).hide();
            } catch (e) { errorDiv.textContent = 'Error de conexión: ' + e.message; }
        });

        document.getElementById('btnGuardarTituloPrograma').addEventListener('click', async () => {
            const valor = document.getElementById('modalTituloValor').value.trim();
            const errorDiv = document.getElementById('modalTituloError');
            if (!valor) { errorDiv.textContent = 'El valor es obligatorio.'; return; }
            try {
                const resp = await fetchConCsrf('/catalogo/titulos/crear-rapido', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ valor })
                });
                const data = await resp.json();
                if (!resp.ok) { errorDiv.textContent = data.error || 'Error al crear.'; return; }
                titulosData.push({ id: data.id, valor: data.valor });
                document.querySelectorAll('.select-titulo').forEach(sel => {
                    const idPreseleccionar = sel === selectTituloActual ? data.id : null;
                    const valorActual = sel.value;
                    sel.innerHTML = opcionesTitulos(idPreseleccionar);
                    if (!idPreseleccionar && valorActual) sel.value = valorActual;
                });
                bootstrap.Modal.getInstance(document.getElementById('modalTituloPrograma')).hide();
            } catch (e) { errorDiv.textContent = 'Error de conexión: ' + e.message; }
        });
    </script>
</section>
</body>
</html>
