<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Textil Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .error-card {
            background: white;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 480px;
        }
        .error-card i { font-size: 3rem; color: #1F4E79; }
        .error-card h3 { color: #1F4E79; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="error-card">
        <i class="bi bi-exclamation-triangle"></i>
        <h3>Ocurrió un error</h3>
        <p class="text-muted">
            Algo no salió como esperábamos. El equipo técnico ya fue notificado.
            Intenta de nuevo o vuelve al inicio.
        </p>
        <a href="/" class="btn btn-primary mt-2">Volver al inicio</a>
    </div>
</body>
</html>
