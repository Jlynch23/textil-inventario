# Reverse proxy de TexControl con HTTPS.
#
# Requiere el certificado wildcard de Let's Encrypt para texcontrol.pe en
# /etc/letsencrypt/live/texcontrol.pe/ ANTES de levantar nginx. Ver DEPLOY.md,
# seccion "Dominio + HTTPS". IMPORTANTE: no promover esta config a `main`/VPS
# hasta tener el certificado emitido, o nginx no arranca (no encuentra el .pem).

# HTTP -> HTTPS: todo el trafico plano se redirige a TLS.
server {
    listen 80;
    server_name texcontrol.pe *.texcontrol.pe;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    # Cubre el dominio raiz y CUALQUIER subdominio (cada cliente = un subdominio,
    # ej. textillaura.texcontrol.pe). El wildcard los resuelve todos por DNS.
    server_name texcontrol.pe *.texcontrol.pe;

    ssl_certificate     /etc/letsencrypt/live/texcontrol.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/texcontrol.pe/privkey.pem;

    # Debe ser >= spring.servlet.multipart.max-file-size (MAX_UPLOAD_SIZE,
    # 25MB por defecto) o nginx rechaza la subida de guias/facturas/ZIP
    # de Archivo Historico ANTES de que llegue a la app, con un 413 confuso.
    client_max_body_size 30m;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # El OCR (AnthropicOcrService) puede tardar hasta 90s por PDF (ver
        # su propio timeout de lectura); sin esto nginx corta la conexion
        # a los 60s por defecto y el usuario ve un error aunque la app
        # todavia estuviera procesando.
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }
}
