# Reverse proxy de TexControl. Sin dominio/HTTPS por ahora (se accede por
# IP); ver DEPLOY.md para agregar un dominio + Let's Encrypt mas adelante
# sin tener que rehacer este archivo desde cero.

server {
    listen 80;
    server_name _;

    # Debe ser >= spring.servlet.multipart.max-file-size (MAX_UPLOAD_SIZE,
    # 25MB por defecto) o nginx rechaza la subida de guias/facturas/ZIP
    # de Archivo Historico ANTES de que llegue a la app, con un 413 confuso.
    client_max_body_size 30m;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # El OCR (AnthropicOcrService) puede tardar hasta 90s por PDF (ver
        # su propio timeout de lectura); sin esto nginx corta la conexion
        # a los 60s por defecto y el usuario ve un error aunque la app
        # todavia estuviera procesando.
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }
}
