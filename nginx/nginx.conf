# Reverse proxy de TexControl con HTTPS + ruteo por subdominio.
#
#   texcontrol.pe / www.texcontrol.pe  -> MARKETING (por ahora redirige a login).
#   login.texcontrol.pe                -> pagina LANZADOR: el cliente escribe su
#                                         empresa y va a su subdominio.
#   <empresa>.texcontrol.pe            -> la app (login e instancia del cliente).
#
# Subdominios reservados (no asignables como empresa): login, www.
#
# Requiere el certificado wildcard de Let's Encrypt para texcontrol.pe en
# /etc/letsencrypt/live/texcontrol.pe/ ANTES de levantar nginx. Ver DEPLOY.md,
# seccion "Dominio + HTTPS". No promover esta config a `main`/VPS hasta tener el
# certificado emitido, o nginx no arranca (no encuentra el .pem).

# HTTP -> HTTPS: todo el trafico plano se redirige a TLS.
server {
    listen 80;
    server_name texcontrol.pe www.texcontrol.pe login.texcontrol.pe *.texcontrol.pe;
    return 301 https://$host$request_uri;
}

# Dominio raiz: MARKETING. Todavia no existe, asi que por ahora redirige al
# lanzador (302 temporal, no cacheable, para poder reemplazarlo por el sitio de
# marketing cuando este listo sin que el navegador siga redirigiendo).
server {
    listen 443 ssl;
    http2 on;
    server_name texcontrol.pe www.texcontrol.pe;

    ssl_certificate     /etc/letsencrypt/live/texcontrol.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/texcontrol.pe/privkey.pem;

    return 302 https://login.texcontrol.pe;
}

# login.texcontrol.pe: pagina lanzador (estatica).
server {
    listen 443 ssl;
    http2 on;
    server_name login.texcontrol.pe;

    ssl_certificate     /etc/letsencrypt/live/texcontrol.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/texcontrol.pe/privkey.pem;

    root /usr/share/nginx/launcher;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Subdominios de empresa (<empresa>.texcontrol.pe): la app del cliente.
# nginx da prioridad a los server_name exactos de arriba (texcontrol.pe, www,
# login), asi que este wildcard solo captura los subdominios de empresas.
# NOTA (etapa multi-cliente): por ahora todos van al mismo `app`. Cuando cada
# cliente tenga su instancia, esto pasa a un `server` por subdominio (o
# proxy_pass dinamico) apuntando al contenedor de ese cliente.
server {
    listen 443 ssl;
    http2 on;
    server_name *.texcontrol.pe;

    ssl_certificate     /etc/letsencrypt/live/texcontrol.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/texcontrol.pe/privkey.pem;

    # Debe ser >= spring.servlet.multipart.max-file-size (MAX_UPLOAD_SIZE,
    # 25MB por defecto) o nginx rechaza la subida de guias/facturas/ZIP
    # de Archivo Historico ANTES de que llegue a la app, con un 413 confuso.
    client_max_body_size 30m;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # El OCR (AnthropicOcrService) puede tardar hasta 90s por PDF (ver
        # su propio timeout de lectura); sin esto nginx corta la conexion
        # a los 60s por defecto y el usuario ve un error aunque la app
        # todavia estuviera procesando.
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }
}
