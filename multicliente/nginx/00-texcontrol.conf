# Config BASE del reverse proxy multi-cliente (se carga primero: 00-...).
#
#   texcontrol.pe / www.texcontrol.pe  -> MARKETING (por ahora redirige a login).
#   login.texcontrol.pe                -> pagina LANZADOR (estatica).
#   <empresa>.texcontrol.pe            -> la app del cliente (bloque por-cliente,
#                                         generado en clientes/cliente-<slug>.conf).
#   subdominio desconocido             -> fallback: de vuelta al lanzador.
#
# Subdominios reservados (no asignables como empresa): login, www.
#
# Requiere el certificado wildcard de Let's Encrypt para texcontrol.pe en
# /etc/letsencrypt/live/texcontrol.pe/ ANTES de levantar nginx (ver DEPLOY.md).

# Incluye los bloques `server` de cada cliente. nginx da prioridad a los
# server_name EXACTOS (<empresa>.texcontrol.pe) sobre el wildcard de fallback
# de mas abajo, asi que cada empresa cae en su bloque y el resto en el fallback.
# El wildcard *.conf no falla si la carpeta esta vacia (aun no hay clientes).
include /etc/nginx/conf.d/clientes/*.conf;

# HTTP -> HTTPS: todo el trafico plano se redirige a TLS.
server {
    listen 80;
    server_name texcontrol.pe www.texcontrol.pe login.texcontrol.pe *.texcontrol.pe;
    return 301 https://$host$request_uri;
}

# Dominio raiz: sitio de MARKETING (estatico). El boton "Ingresar" lleva al
# lanzador en login.texcontrol.pe.
server {
    listen 443 ssl;
    http2 on;
    server_name texcontrol.pe www.texcontrol.pe;

    ssl_certificate     /etc/letsencrypt/live/texcontrol.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/texcontrol.pe/privkey.pem;

    root /usr/share/nginx/marketing;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# login.texcontrol.pe: pagina lanzador (estatica).
server {
    listen 443 ssl;
    http2 on;
    server_name login.texcontrol.pe;

    ssl_certificate     /etc/letsencrypt/live/texcontrol.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/texcontrol.pe/privkey.pem;

    root /usr/share/nginx/launcher;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Fallback para subdominios de empresa NO dados de alta (typos, empresas que
# aun no existen). Sin esto, un <empresa>.texcontrol.pe sin bloque propio no
# tendria a donde ir. Se los devuelve al lanzador para que reintenten.
server {
    listen 443 ssl default_server;
    http2 on;
    server_name *.texcontrol.pe;

    ssl_certificate     /etc/letsencrypt/live/texcontrol.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/texcontrol.pe/privkey.pem;

    return 302 https://login.texcontrol.pe;
}
