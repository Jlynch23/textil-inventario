services:
  mysql:
    image: mysql:8.4
    container_name: textil_mysql
    restart: unless-stopped
    environment:
      # Contraseña de root separada de la del usuario de la app: si se filtra
      # la credencial de la app (DB_PASSWORD), no debe dar acceso root a MySQL.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: textil_inventario
      MYSQL_USER: textil_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer es una consola de administración de base de datos completa.
  # No levantar este servicio en producción sin protección adicional.
  # Si se necesita en el servidor real (AWS Lightsail), acceder solo vía
  # túnel SSH (ssh -L 8081:localhost:8081 ...), nunca abrir el puerto
  # 8081 en el firewall de la instancia.
  adminer:
    image: adminer:latest
    container_name: textil_adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
