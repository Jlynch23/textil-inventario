<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title/text()}, ~{::section})}">
<head><title>Dashboard</title></head>
<body>
<section>
    <div class="row g-4">
        <!-- CARDS RESUMEN -->
        <div class="col-md-3">
            <div class="card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1 small">Total Colores</p>
                            <h3 class="fw-bold mb-0">8</h3>
                        </div>
                        <div class="bg-primary bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-palette fs-4 text-primary"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1 small">Artículos</p>
                            <h3 class="fw-bold mb-0">0</h3>
                        </div>
                        <div class="bg-success bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-tags fs-4 text-success"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1 small">Ubicaciones</p>
                            <h3 class="fw-bold mb-0">6</h3>
                        </div>
                        <div class="bg-warning bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-geo-alt fs-4 text-warning"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1 small">Recepciones</p>
                            <h3 class="fw-bold mb-0">0</h3>
                        </div>
                        <div class="bg-info bg-opacity-10 rounded-3 p-3">
                            <i class="bi bi-truck fs-4 text-info"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ACCESOS RÁPIDOS -->
    <div class="row g-4 mt-2">
        <div class="col-12">
            <div class="card">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3">Accesos Rápidos</h6>
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/catalogo/colores}" class="btn btn-outline-primary">
                            <i class="bi bi-palette me-2"></i>Carta de Colores
                        </a>
                        <a th:href="@{/catalogo/articulos}" class="btn btn-outline-primary">
                            <i class="bi bi-tags me-2"></i>Artículos
                        </a>
                        <a th:href="@{/catalogo/ubicaciones}" class="btn btn-outline-primary">
                            <i class="bi bi-geo-alt me-2"></i>Ubicaciones
                        </a>
                        <a th:href="@{/recepciones}" class="btn btn-outline-success">
                            <i class="bi bi-truck me-2"></i>Nueva Recepción
                        </a>
                        <a th:href="@{/inventario/stock}" class="btn btn-outline-info">
                            <i class="bi bi-boxes me-2"></i>Ver Stock
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
