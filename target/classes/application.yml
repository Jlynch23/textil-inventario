spring:
  application:
    name: textil-inventario

  datasource:
    url: jdbc:mysql://localhost:3306/textil_inventario?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
    username: textil_user
    password: ***REMOVED***
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false
    encoding: UTF-8

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
